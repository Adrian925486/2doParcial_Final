<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Mundo Mascotas</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Mundo Mascotas</div>
            <button class="menu-toggle" id="menuToggle">☰</button>
            <ul class="nav-links" id="navLinks">
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="inicio.html" class="active">Catálogo</a></li>
                <li><a href="nosotros.html">Nosotros</a></li>
                <li><a href="servicios.html">Servicios</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1 class="page-title">Encuentra a tu compañero ideal</h1>
        
        <!-- Filtro de categorías -->
        <div class="filter-section">
            <select id="categoria">
                <option value="todas">Todas las mascotas</option>
                <option value="perros">Perros 🐕</option>
                <option value="gatos">Gatos 🐈</option>
                <option value="otros">Otros 🐾</option>
            </select>
        </div>

        <!-- Indicador de filtro activo -->
        <div id="filtro-activo" class="filtro-activo">🐾 Mostrando todas las mascotas</div>

        <!-- Grid de FLIP CARDS -->
        <div class="flip-card-container" id="mascotas-container"></div>
    </main>

    <!-- Carrito Flotante MEJORADO -->
    <div class="cart-icon-container">
        <div class="cart-icon" onclick="toggleCarritoFlotante()">
            <span>🛒</span>
            <span class="cart-count" id="cart-count">0</span>
        </div>
        <div class="cart-dropdown" id="cart-dropdown">
            <div class="cart-header">
                <h3>Mi Carrito</h3>
                <button class="btn-vaciar" onclick="vaciarCarrito()">Vaciar</button>
            </div>
            <div class="cart-items-flotante" id="cart-items-flotante">
                <p class="cart-empty">🐾 El carrito está vacío</p>
            </div>
            <div class="cart-footer">
                Total: <span id="cart-total-flotante">$0</span>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Mundo Mascotas Veterinaria - Cuidando a tus mejores amigos 🐾</p>
    </footer>

    <script src="../scripts/main.js"></script>
    <script src="../scripts/carrito.js"></script>
    <script src="../scripts/dom.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            cargarMascotas();
            document.getElementById('categoria').addEventListener('change', filtrarMascotas);
        });
    </script>
</body>
</html>
